{% extends "base.html" %}
{% block title %}习惯追踪 - 智能日程管理{% endblock %}

{% block content %}
<div class="page-header">
	<h2>🔄 习惯追踪</h2>
	<p class="text-muted">记录并分析你的日常习惯</p>
</div>

<div class="toolbar">
	<div class="toolbar-left">
		<input type="date" id="habitDate" class="form-input" style="width:auto" value="{{ today }}" onchange="loadHabits()">
	</div>
	<button class="btn btn-primary" onclick="openHabitModal()">+ 打卡</button>
</div>

<div class="dashboard-grid">
	<div class="dash-panel" style="grid-column: 1 / -1;">
		<div class="panel-header">
			<h3>今日打卡</h3>
			<button class="btn btn-sm" onclick="loadHabitStats()">刷新统计</button>
		</div>
		<div class="panel-body">
			<div id="habitList"><p class="empty-hint">加载中...</p></div>
		</div>
	</div>

	<div class="dash-panel">
		<div class="panel-header"><h3>📈 习惯统计</h3></div>
		<div class="panel-body"><div id="habitStats"><p class="empty-hint">点击刷新统计</p></div></div>
	</div>

	<div class="dash-panel">
		<div class="panel-header">
			<h3>🤖 AI 分析</h3>
			<button class="btn btn-sm btn-primary" onclick="loadAIAnalysis()">AI 分析</button>
		</div>
		<div class="panel-body"><div id="aiAnalysis"><p class="empty-hint">点击按钮获取 AI 建议</p></div></div>
	</div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/habits.js') }}"></script>
{% endblock %}
